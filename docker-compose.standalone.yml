# ============================================
# AI 创作室 - 独立前端部署
# 只部署前端，使用自己的数据库和对象存储
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-studio-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ============================================
      # 数据库配置（连接 Coze 环境）
      # ============================================
      COZE_SUPABASE_URL: ${COZE_SUPABASE_URL}
      COZE_SUPABASE_ANON_KEY: ${COZE_SUPABASE_ANON_KEY}
      
      # ============================================
      # 对象存储配置（连接 Coze 环境）
      # 需要同时配置以下变量才能使用 Coze 托管存储
      # ============================================
      COZE_BUCKET_ENDPOINT_URL: ${COZE_BUCKET_ENDPOINT_URL}
      COZE_BUCKET_NAME: ${COZE_BUCKET_NAME}
      # ⚠️ 关键：此变量是使用 Coze 托管存储的必要条件
      COZE_WORKLOAD_IDENTITY_API_KEY: ${COZE_WORKLOAD_IDENTITY_API_KEY}
      
      # 或者使用自建 S3 存储（二选一）
      # S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      # S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      # S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      # S3_SECRET_KEY: ${S3_SECRET_KEY}
      # S3_REGION: ${S3_REGION:-us-east-1}
      
      # Node 环境
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 如果使用本地 PostgreSQL，取消下面的注释
    # depends_on:
    #   db:
    #     condition: service_healthy

